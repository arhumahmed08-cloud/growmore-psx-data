name: Fetch PSX Data

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch PSX data
        run: python fetch_psx.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/market.json
          git diff --staged --quiet || git commit -m "PSX data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
